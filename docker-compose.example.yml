services:
  zwavejs-lock-manager:
    image: zwavejs-lock-manager:latest
    build: .
    # Run as the invoking host user so bind mounts don't need chown.
    # UID/GID come from .env (see .env.example).
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      DATA_DIR: /data
      LOCAL_SECRET: ${LOCAL_SECRET}
      HA_TOKEN: ${HA_TOKEN}
      LOG_LEVEL: info
      PORT: 8080
    volumes:
      - ./data:/data
    ports:
      - "18080:8080"
    restart: unless-stopped
    # Expects zwave-js-server reachable at the URL in locks.yaml.
