name: ZWaveJS Lock Manager
version: "0.1.0"
slug: zwavejs_lock_manager
description: Synchronize PIN codes across Z-Wave door locks and notify via Home Assistant.
url: https://github.com/rgregg/zwavejs-lock-manager
# Prebuilt multi-arch images published by .github/workflows/addon-build.yml.
# HA substitutes {arch} (amd64 / aarch64) with the host architecture.
image: ghcr.io/rgregg/zwavejs-lock-manager-{arch}
arch:
  - amd64
  - aarch64
init: false
startup: application
boot: auto
panel_icon: mdi:lock-smart
ingress: true
ingress_port: 8080
homeassistant_api: true
hassio_api: true
auth_api: false
options:
  read_only: true
  zwave_url: ""
  notify_service: notify.notify
  verify_interval_days: 7
  verify_stagger_minutes: 60
  log_level: info
  locks: []
schema:
  read_only: bool
  zwave_url: str?
  notify_service: str
  notify_category: str?
  verify_interval_days: int(1,365)
  verify_stagger_minutes: int(0,1440)
  log_level: list(trace|debug|info|warn|error|fatal)?
  locks:
    - id: str
      name: str
      node_id: int(1,232)
      max_code_slots: int(1,250)?
