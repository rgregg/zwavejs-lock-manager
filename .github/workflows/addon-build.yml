name: Build add-on images

on:
  push:
    branches: [main]
    tags: ["addon-*"]
    paths:
      - "src/**"
      - "zwavejs-lock-manager/**"
      - "repository.yaml"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - ".github/workflows/addon-build.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
        if: matrix.arch != 'amd64'
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve add-on version
        id: meta
        run: |
          VERSION=$(awk -F'"' '/^version:/ {print $2}' zwavejs-lock-manager/config.yaml)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Add-on version: $VERSION"

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: zwavejs-lock-manager/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/${{ matrix.arch }}-base:3.21
          tags: |
            ghcr.io/${{ github.repository_owner }}/zwavejs-lock-manager-${{ matrix.arch }}:${{ steps.meta.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/zwavejs-lock-manager-${{ matrix.arch }}:latest
          cache-from: type=gha,scope=addon-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=addon-${{ matrix.arch }}
