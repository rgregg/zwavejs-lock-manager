name: Build add-on images

on:
  push:
    branches: [main]
    tags: ["addon-*"]
    paths:
      - "src/**"
      - "addon/**"
      - "package*.json"
      - "tsconfig.json"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, aarch64]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
        if: matrix.arch != 'amd64'

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version
        id: meta
        run: |
          VERSION=$(awk -F'"' '/^version:/ {print $2}' addon/zwavejs-lock-users/config.yaml)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: addon/zwavejs-lock-users/Dockerfile
          platforms: linux/${{ matrix.arch == 'aarch64' && 'arm64' || 'amd64' }}
          push: true
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/${{ matrix.arch }}-base:3.19
          tags: |
            ghcr.io/${{ github.repository_owner }}/zwavejs-lock-users-${{ matrix.arch }}:${{ steps.meta.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/zwavejs-lock-users-${{ matrix.arch }}:latest
          cache-from: type=gha,scope=addon-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=addon-${{ matrix.arch }}
